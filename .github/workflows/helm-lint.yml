name: helm-lint

on:
  pull_request:
    paths:
      - "observability/**"
      - "helm-chart/**"
      - ".github/workflows/helm-lint.yml"
  push:
    branches: [ "main" ]
    paths:
      - "observability/**"
      - "helm-chart/**"
      - ".github/workflows/helm-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint kube-prometheus-stack values (template)
        run: |
          set -e
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm template monitoring prometheus-community/kube-prometheus-stack \
            -n monitoring \
            -f observability/prometheus/values.yaml > /tmp/monitoring.yaml